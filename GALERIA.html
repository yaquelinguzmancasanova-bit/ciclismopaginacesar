<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colegio de Bachilleres de Yucatán - Plantel Tixméhuac</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#2c3e50;
}

/* ENCABEZADO */

header{
    height:300px;
    background-image:url("bannerbici.webp");
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:black;
}

.header-overlay{
    background:cyan;
    padding:30px;
    border-radius:10px;
}

header h1{
    margin:0;
    font-size:36px;
}

header h2{
    margin-top:10px;
    font-weight:normal;
}

/* GALERIA */

.galeria{
    padding:40px;
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:25px;
    max-width:1000px;
    margin:auto;
}

.item{
    text-align:center;
}

.item img{
    width:100%;
    border-radius:15px;
    height:200px;
    object-fit:cover;
}

.item p{
    margin-top:8px;
    font-size:14px;
    color:gold;
}
/* ANIMACIONES HOVER */

.item:hover{
    transform: translateY(-8px);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.item:hover img{
    border:solid red;
    box-shadow:0 0 5px red,
               0 0 10px red,
               0 0 20px red,
               0 0 40px red,
               0 0 80px red;
    transform: scale(1.08);
}

.item:hover p{
    color:CYAN;
}
</style>
</head>

<body>
    <header>
        <div class="header-overlay">
            <h1>GALERIA</h1>
            <h2>CICLISMO</h2>
        </div>
    </header>
<section class="galeria">
    <div class="item">
        <img src="downhill.avif">
        <p>DOWNHILL</p>
    </div>
    <div class="item">
        <img src="ciclismo.jpg">
        <p>RUTA</p>
    </div>
    <div class="item">
        <img src="imagendebici.jpg">
        <p>MTB</p>
    </div>
    <div class="item">
        <img src="specialized.png">
        <p>SPECIALIZED</p>
    </div>
    <div class="item">
        <img src="trek.png">
        <p>TREK</p>
    </div>
    <div class="item">
        <img src="scott.jpg">
        <p>SCOTT</p>
    </div>
    <div class="item">
        <img src="wout.jpg">
        <p>WOUT</p>
    </div>
    <div class="item">
        <img src="primoz.jpg">
        <p>PRIMOZ</p>
    </div>
    <div class="item">
        <img src="jonas.jpg">
        <p>JONAS</p>
    </div>
</section>

</body>
</html>
